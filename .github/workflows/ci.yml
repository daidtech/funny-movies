name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: funny_movies_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.2"
          bundler-cache: true
          working-directory: backend

      - name: Setup database
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/funny_movies_test
          RAILS_ENV: test
          REDIS_URL: redis://localhost:6379/0
          DEVISE_SECRET_KEY: ${{ secrets.DEVISE_SECRET_KEY || 'ci_devise_secret_key_for_testing_only_not_used_in_prod' }}
          DEVISE_JWT_SECRET_KEY: ${{ secrets.DEVISE_JWT_SECRET_KEY || 'ci_jwt_secret_key_for_testing_only_not_used_in_prod_64chars' }}
        run: |
          bundle exec rails db:create db:schema:load

      - name: Run RSpec
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/funny_movies_test
          RAILS_ENV: test
          REDIS_URL: redis://localhost:6379/0
          DEVISE_SECRET_KEY: ${{ secrets.DEVISE_SECRET_KEY || 'ci_devise_secret_key_for_testing_only_not_used_in_prod' }}
          DEVISE_JWT_SECRET_KEY: ${{ secrets.DEVISE_JWT_SECRET_KEY || 'ci_jwt_secret_key_for_testing_only_not_used_in_prod_64chars' }}
        run: |
          bundle exec rspec --format documentation
